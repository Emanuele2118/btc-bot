name: Bot BTC/USDT Paper Trading 24h

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permette al bot di salvare il file portfolio.json nel repository
    steps:
      - name: Clona repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa librerie
        run: |
          pip install yfinance pandas numpy requests

      - name: Esegui script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python btc_bot.py

      - name: Salva aggiornamenti portafoglio
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Aggiornamento automatico portafoglio virtuale [skip ci]"
          file_pattern: portfolio.json
